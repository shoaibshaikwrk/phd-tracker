name: Daily PhD Position Check

on:
  schedule:
    # 13:00 UTC = 8:00am US Eastern / 5:00am US Pacific / 1:00pm UK. Adjust as
    # you like — https://crontab.guru is handy for editing this.
    - cron: "0 */8 * * *"
  workflow_dispatch: {}
  # ^ lets you trigger a run manually from the Actions tab, useful for testing.

permissions:
  contents: write

jobs:
  check-positions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PhD position checker
        run: python3 phd_checker.py config.web.json

      - name: Commit and push updated data/site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily PhD position check: $(date -u +'%Y-%m-%d')"
            git push
          fi
